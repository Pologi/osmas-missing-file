<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IMAGEVIEW.EXE</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #008080;
      font-family: "Tahoma", "MS Sans Serif", sans-serif;
    }

    body {
      overflow: auto;
    }

    .desktop {
      width: 100%;
      min-height: 100vh;
      position: relative;
      background: linear-gradient(to bottom, #008080 0%, #007878 100%);
      overflow: hidden;
      padding: 24px;
      box-sizing: border-box;
    }

    .window {
      width: min(900px, 92vw);
      position: relative;
      margin: 0 auto;
      background: #c0c0c0;
      border-top: 2px solid #ffffff;
      border-left: 2px solid #ffffff;
      border-right: 2px solid #404040;
      border-bottom: 2px solid #404040;
      box-shadow: 2px 2px 0 #000000;
      user-select: auto;
      -webkit-user-select: auto;
    }

    @media (min-width: 701px) {
      .window {
        position: absolute;
        top: 50%;
        left: 50%;
        margin: 0;
        transform: translate(-50%, -50%);
      }
    }

    .titlebar {
      height: 30px;
      background: linear-gradient(to right, #000080, #1084d0);
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 6px 0 8px;
      box-sizing: border-box;
      font-size: 13px;
      font-weight: bold;
      cursor: move;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    .title-left {
      display: flex;
      align-items: center;
      gap: 6px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .title-icon {
      width: 16px;
      height: 16px;
      background: #c0c0c0;
      color: black;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      border-top: 1px solid #ffffff;
      border-left: 1px solid #ffffff;
      border-right: 1px solid #404040;
      border-bottom: 1px solid #404040;
      line-height: 1;
      flex-shrink: 0;
    }

    .title-buttons {
      display: flex;
      gap: 2px;
      flex-shrink: 0;
    }

    .title-btn {
      width: 18px;
      height: 18px;
      background: #c0c0c0;
      color: black;
      border-top: 1px solid #ffffff;
      border-left: 1px solid #ffffff;
      border-right: 1px solid #404040;
      border-bottom: 1px solid #404040;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      box-sizing: border-box;
      cursor: default;
      user-select: none;
      -webkit-user-select: none;
    }

    .menubar {
      background: #c0c0c0;
      border-top: 1px solid #dfdfdf;
      border-bottom: 1px solid #808080;
      padding: 4px 8px;
      font-size: 12px;
      color: black;
      display: flex;
      gap: 18px;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
    }

    .content {
      padding: 14px;
      background: #c0c0c0;
    }

    .image-panel {
      background: black;
      border-top: 2px solid #808080;
      border-left: 2px solid #808080;
      border-right: 2px solid #ffffff;
      border-bottom: 2px solid #ffffff;
      padding: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 340px;
      box-sizing: border-box;
    }

    .image-panel img {
      max-width: 100%;
      max-height: 60vh;
      display: block;
      image-rendering: auto;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .binary-label {
      margin-top: 12px;
      margin-bottom: 4px;
      font-size: 12px;
      color: black;
      user-select: none;
      -webkit-user-select: none;
    }

    .binary-box {
      width: 100%;
      min-height: 92px;
      resize: none;
      margin: 0;
      background: #ffffff;
      color: #000000;
      border-top: 2px solid #808080;
      border-left: 2px solid #808080;
      border-right: 2px solid #ffffff;
      border-bottom: 2px solid #ffffff;
      padding: 10px 12px;
      font-family: "Courier New", monospace;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      user-select: text;
      -webkit-user-select: text;
      cursor: text;
      touch-action: auto;
      box-sizing: border-box;
    }

    .statusbar {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 5px 6px;
      background: #c0c0c0;
      border-top: 1px solid #808080;
      box-sizing: border-box;
      font-size: 12px;
      color: black;
      user-select: none;
      -webkit-user-select: none;
    }

    .status-section {
      flex: 1;
      min-height: 20px;
      display: flex;
      align-items: center;
      padding: 2px 6px;
      background: #c0c0c0;
      border-top: 1px solid #808080;
      border-left: 1px solid #808080;
      border-right: 1px solid #ffffff;
      border-bottom: 1px solid #ffffff;
      box-sizing: border-box;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    @media (max-width: 700px) {
      .desktop {
        padding: 10px;
        overflow: auto;
      }

      .window {
        width: 96vw;
      }

      .titlebar {
        cursor: default;
      }

      .image-panel {
        min-height: 220px;
      }

      .binary-box {
        font-size: 12px;
        min-height: 120px;
      }

      .statusbar {
        flex-direction: column;
        gap: 4px;
      }
    }
  </style>
</head>
<body>
  <div class="desktop">
    <div class="window" id="appWindow">
      <div class="titlebar" id="dragHandle">
        <div class="title-left">
          <div class="title-icon">▣</div>
          <div>IMAGEVIEW.EXE - [recovered_image_04.jpg]</div>
        </div>
        <div class="title-buttons">
          <div class="title-btn">_</div>
          <div class="title-btn">□</div>
          <div class="title-btn">×</div>
        </div>
      </div>

      <div class="menubar">
        <div>File</div>
        <div>Edit</div>
        <div>View</div>
        <div>Help</div>
      </div>

      <div class="content">
        <div class="image-panel">
          <img src="missing-person.jpg" alt="Recovered image">
        </div>

        <div class="binary-label">Recovered text layer:</div>
        <textarea class="binary-box" readonly>01001111 01110011 01101101 01100001 01110011 00100000 01101001 01110011 00100000 01110111 01100001 01110100 01100011 01101000 01101001 01101110 01100111</textarea>
      </div>

      <div class="statusbar">
        <div class="status-section">Recovered file opened.</div>
        <div class="status-section">Format: JPG</div>
        <div class="status-section">Access: Read Only</div>
      </div>
    </div>
  </div>

  <script>
    const win = document.getElementById("appWindow");
    const handle = document.getElementById("dragHandle");

    let isDragging = false;
    let offsetX = 0;
    let offsetY = 0;

    function isMobileLayout() {
      return window.innerWidth <= 700;
    }

    function getClientX(e) {
      return e.touches ? e.touches[0].clientX : e.clientX;
    }

    function getClientY(e) {
      return e.touches ? e.touches[0].clientY : e.clientY;
    }

    function startDrag(e) {
      if (isMobileLayout()) return;
      if (e.target.closest(".title-btn")) return;

      const rect = win.getBoundingClientRect();
      isDragging = true;
      offsetX = getClientX(e) - rect.left;
      offsetY = getClientY(e) - rect.top;

      win.style.transform = "none";
      win.style.left = rect.left + "px";
      win.style.top = rect.top + "px";
    }

    function moveDrag(e) {
      if (!isDragging) return;

      e.preventDefault();

      const desktop = document.querySelector(".desktop");
      const desktopRect = desktop.getBoundingClientRect();
      const winRect = win.getBoundingClientRect();

      let newLeft = getClientX(e) - offsetX;
      let newTop = getClientY(e) - offsetY;

      const maxLeft = desktopRect.width - winRect.width;
      const maxTop = desktopRect.height - winRect.height;

      newLeft = Math.max(0, Math.min(newLeft, maxLeft));
      newTop = Math.max(0, Math.min(newTop, maxTop));

      win.style.left = newLeft + "px";
      win.style.top = newTop + "px";
    }

    function stopDrag() {
      isDragging = false;
    }

    handle.addEventListener("mousedown", startDrag);
    document.addEventListener("mousemove", moveDrag);
    document.addEventListener("mouseup", stopDrag);

    handle.addEventListener("touchstart", startDrag, { passive: true });
    document.addEventListener("touchmove", moveDrag, { passive: false });
    document.addEventListener("touchend", stopDrag);
    document.addEventListener("touchcancel", stopDrag);
  </script>
</body>
</html>
